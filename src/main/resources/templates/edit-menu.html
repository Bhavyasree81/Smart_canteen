<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Menu Item | Smart Canteen</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff7f0;
        }

        /* Header */
        .header {
            background: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff7a18;
        }

        .header h1 {
            margin: 0;
            color: #ff7a18;
        }

        /* Form Card */
        .form-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            background: #ff7a18;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #e56700;
        }

        .btn-cancel {
            background: #6c757d;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            text-decoration: none;
            font-weight: bold;
            color: #1e3a8a;
            margin: 0 10px;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            color: #0066cc;
        }
    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <h1>Edit Menu Item ✏️</h1>
</div>

<!-- Form -->
<div class="form-container">

    <div class="info-box">
        Item ID: <strong th:text="${menuItem.id}"></strong>
    </div>

    <form th:action="@{/admin/menu/edit/{id}(id=${menuItem.id})}" method="post">

        <label>Food Name</label>
        <input type="text" name="foodName" th:value="${menuItem.foodName}" required>

        <label>Price (₹)</label>
        <input type="number" name="price" step="0.01" th:value="${menuItem.price}" required>

        <label>Category</label>
        <input type="text" name="category" th:value="${menuItem.category}" required>
        
        <label>Food Image</label>
        <input type="text" name="image" th:value="${menuItem.image}" placeholder="example: /images/masala-dosa.jpg">

        <label>Available</label>
        <select name="available">
            <option value="true" th:selected="${menuItem.available}">Available</option>
            <option value="false" th:selected="${!menuItem.available}">Sold Out</option>
        </select>
        
        <div class="btn-group">
            <button class="btn" type="submit">💾 Save Changes</button>
            <a href="javascript:history.back()" class="btn btn-cancel" style="text-align:center; line-height:46px;">Cancel</a>
        </div>
    </form>

    <div class="links">
        <a th:href="@{/admin/menu/list}">View all items</a> |
        <a th:href="@{/admin/dashboard}">Dashboard</a>
    </div>

</div>

</body>
</html>
