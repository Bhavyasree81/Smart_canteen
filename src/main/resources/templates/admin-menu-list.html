<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Menu List</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff7f0;
        }

        .header {
            background: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff7a18;
        }

        .header h1 {
            margin: 0;
            color: #ff7a18;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #ff7a18;
            color: white;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f0f0f0;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .edit-btn {
            padding: 8px 15px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .edit-btn:hover {
            background: #1e7e34;
        }

        .delete-btn {
            padding: 8px 15px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #b21f2d;
        }

        .bottom-links {
            text-align: center;
            margin-top: 30px;
        }

        .add-btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-right: 15px;
        }

        .add-btn:hover {
            background: #0056b3;
        }

        .back-btn {
            padding: 10px 20px;
            background: #1e3a8a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #162c6a;
        }
    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <h1>📋 Menu Items Management</h1>
</div>

<!-- Container -->
<div class="container">

<table>
    <tr>
        <th>ID</th>
        <th>Food Name</th>
        <th>Category</th>
        <th>Price (₹)</th>
        <th>Available</th>
        <th>Actions</th>
    </tr>

    <!-- THIS LOOP IS THE KEY -->
    <tr th:each="item : ${menuItems}">
        <td th:text="${item.id}"></td>
        <td th:text="${item.foodName}"></td>
        <td th:text="${item.category}"></td>
        <td th:text="${item.price}"></td>
        <td th:text="${item.available}"></td>
        <td>
            <div class="action-buttons">
                <a class="edit-btn" th:href="@{/admin/menu/edit/{id}(id=${item.id})}">
                    ✏️ Edit
                </a>
                <a class="delete-btn" th:href="@{/admin/menu/delete/{id}(id=${item.id})}" 
                   onclick="return confirm('Are you sure you want to delete this item?')">
                    🗑️ Delete
                </a>
            </div>
        </td>
    </tr>

</table>

</div>

<!-- Bottom Links -->
<div class="bottom-links">
    <a class="add-btn" th:href="@{/admin/menu/add}">➕ Add New Item</a>
    <a class="back-btn" th:href="@{/admin/dashboard}">← Back to Dashboard</a>
</div>

</body>
</html>
